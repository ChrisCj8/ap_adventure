apadventure.node.mapitem.name=Item Name
apadventure.node.mapitem.count=Item Count
apadventure.node.mapitem.help=Help
apadventure.node.mapitem.helpbase=This node checks how many of a certain Map Item the player has. Map Items can be created in the Map Item Tab, but you currently can't make them actually do anything without a config script or by placing apAdventures map entities in Hammer, so this won't be of much use to you unless you're a coder or mapper.

apadventure.node.has.name=Item Name
apadventure.node.has.count=Item Count
apadventure.node.has.help=Help
apadventure.node.has.helpbase=This node checks how many of a certain item the player has by its name.
apadventure.node.has.helpdontuse=You should not be using this node in most cases, as it's likely to break on future updates as item names may change in the future.

apadventure.node.bhop.help=Help
apadventure.node.bhop.helpbase=This node checks whether the player has the ability to bhop and if bhop logic is enabled.
apadventure.node.bhop.helppreprocess=If either bhop or bhop_logic is set to false in the players YAML then the generator will automatically recognize this and preprocess this node out. If this results in an access rule being impossible to fulfill, whatever location, entrance or exit this rule was assigned to will not be created or connected. You can utilize this behaviour to prevent BHop maps from being added to a run automatically by putting this rule on your entrances.

apadventure.node.capab.override=Override Regional Conditions
apadventure.node.capab.help=Help
apadventure.node.capab.helpbase=The Capability node is one of the main ways to check for items in apAdventure. Items in apAdventure may have "Capabilities" assigned to them, which the generator checks for instead of looking for specific items. This allows custom items to fulfill logic rules without needing to be supported explicitly.
apadventure.node.capab.helpideflink=There is currently no way to view what items provide what conditions ingame, so you'll have to figure this out by looking at the item definitions for now.
apadventure.node.capab.helpimplied=Some Capabilities will also automatically fulfill other Capabilities when set on an item. You can find out what those are here.
apadventure.node.capab.helpcond=Some items may only provide certain Capabilities if certain conditions are fulfilled. For example, the Half-Life 2 Shotgun will only provide the Capability "StrongShortRange" under the Condition "Ammo_Buckshot".
apadventure.node.capab.helpmulti=If you set this rule to check for multiple capabilities, it will check if all of those capabilities exist on the same item. If you just want to check if a player has certain capabilities, but don't care if they're on the same item or not, you should create multiple of these nodes and put them inside "and" or "or" nodes.
apadventure.node.capab.helpoverride=Normally, this rule looks for the currently fulfilled Conditions by looking at the region it's currently in, but you can override these Conditions by checking "Override" and setting some custom conditions for this rule in the form below.
apadventure.node.capab.helpsave=Note that due to the way nodes are saved, if you set some Conditions in the Condition Form but do not enable the Override Check, those Conditions will not be saved and will disappear if you start editing another node.

