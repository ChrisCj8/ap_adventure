apadventure.editor.respawn.label=Allow players to respawn after death
apadventure.editor.respawn.help=Normally, when a player dies, they will have to wait until all players have died, causing the config to be reloaded. This setting allows players to respawn immediately, as many times as they want, as if they were playing sandbox.
apadventure.editor.godmode.label=Disable damage to players
apadventure.editor.godmode.help=Prevents players from taking damage from most sources, they may still die or lose HP to things that set their health to a certain value or kill them directly without dealing damage, such as killbinds, similar to the sbox_godmode cvar in sandbox.

