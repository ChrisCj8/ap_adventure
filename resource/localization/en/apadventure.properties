apadventure.editor.accel.label=Player Acceleration
apadventure.editor.accel.help=What sv_accelerate should be set to when the config is loaded. This value controls how quickly players will gain speed when they start pushing their movement keys while on the ground.
apadventure.editor.airaccel.label=Player Air Acceleration
apadventure.editor.airaccel.help=What sv_airacceleration should be set to when the config is loaded. This value controls how much speed players can gain from Air Strafing. BHop and Surf maps usually expect this value to be higher than normal.
apadventure.editor.stopspd.label=Player Stop Speed
