apadventure.connect.title=Connection
apadventure.connect.address=Address
apadventure.connect.hint.address=The address of the Archipelago Server you're trying to connect to.\nIf you're playing on archipelago.gg, you can just enter the port of the room you're trying to connect to and GMAP will autocomplete the address for you.\nIf you're self-hosting, you can leave this completely empty and GMAP will default to localhost:38281.\nGMAP will also add the default port of 38281 if it can't find a port at the end of your address.\nIt will also try to add wss:// if it can't detect a valid scheme at the start of the address, meaning you will have to add ws:// manually if you want to connect to an unsecure websocket connection as it will fail to connect otherwise.
apadventure.connect.slotname=Slot Name
apadventure.connect.hint.slotname=The name of the slot you're trying to connect to.
apadventure.connect.password=Password
apadventure.connect.hint.password=The password of the room you're trying to connect to.
apadventure.connect.send=Send Info and Connect
apadventure.connect.hint.send=This button sends your connection info to the GMod Server and makes it connect to the Archipelago server. (GMod is separated into a client and server state, even in singleplayer. You are always playing on a server.)
apadventure.connect.connect=Connect
apadventure.connect.disconnect=Disconnect
apadventure.connect.hint.connect=If you have already sent connection info to the server, you can use these buttons to reconnect with or disconnect from the Archipelago Server.
apadventure.connect.presets=Presets
apadventure.connect.presetsave=Save Preset
apadventure.connect.presetnotfssafe=Preset Names need to be filesystem-safe!
apadventure.connect.presetnoname=The Preset needs a name!
apadventure.connect.hint.preset=You can load connection info from a preset by selecting it in this dropdown.\nClicking the bin icon next to the dropdown deletes the currently selected preset.\nHover your mouse over the "Save Preset"-Button or the input field next to it to find out how to create a preset.
apadventure.connect.hint.presetsave=You can save your current settings as a preset by entering a name for your preset and hitting "Save Preset" here.\n The name of the preset can only contain lowercase latin characters, numbers and the "_" and "-"-Symbols because of how GMods file system works.\n Once you have saved a preset you can not only select it from the dropdown at the top of this form, but also enter this name into the "Connection Preset"-Option in the Main Menu, which makes the gamemode connect to AP using the info from your preset automatically.
apadventure.connect.hint.initial=Hover your mouse over the different fields in this form to find out more about them.

